<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>My Account - EKG Monitoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/account">My Account</a>
        <a href="/logout">Logout</a>
    </nav>

    <div class="container">
        <h1>Dashboard EKG</h1>
        
        <div class="card">
            <canvas id="ekgChart"></canvas>
        </div>

        <div class="history-section">
            <h3>Riwayat Data</h3>
            <table>
                <tr>
                    <th>Waktu</th>
                    <th>Nilai</th>
                </tr>
                {% for item in history %}
                <tr>
                    <td>{{ item.timestamp }}</td>
                    <td>{{ item.nilai }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('ekgChart').getContext('2d');
        const ekgChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 20}, (_, i) => i),
                datasets: [{
                    label: 'Sinyal EKG',
                    data: [],
                    borderColor: '#2ecc71',
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: { scales: { y: { min: 0, max: 1024 } } }
        });
    </script>
</body>
</html>
